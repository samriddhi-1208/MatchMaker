<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TDC Matchmaker — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a0533 0%, #3b0764 40%, #6b21a8 100%);
      overflow: hidden;
    }

    /* Decorative blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: #ec4899; top: -150px; left: -150px; }
    .blob-2 { width: 400px; height: 400px; background: #a855f7; bottom: -100px; right: -100px; }
    .blob-3 { width: 300px; height: 300px; background: #f97316; top: 50%; left: 50%; transform: translate(-50%, -50%); }

    .login-wrapper {
      display: flex;
      width: 100%;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* Left branding panel */
    .branding {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      color: white;
    }
    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }
    .brand-logo span { color: #f9a8d4; }
    .brand-tagline {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.7;
      max-width: 400px;
      margin-bottom: 48px;
    }
    .brand-stats {
      display: flex;
      gap: 40px;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #f9a8d4;
    }
    .stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Right login card */
    .login-card-wrap {
      width: 440px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .login-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      box-shadow: 0 32px 64px rgba(0,0,0,0.4);
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: white;
      margin-bottom: 8px;
    }
    .card-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 36px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.35); }
    .form-group input:focus {
      border-color: #f9a8d4;
      background: rgba(255,255,255,0.15);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ec4899, #a855f7);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    .error-msg {
      color: #ff8da1;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      min-height: 18px;
      font-weight: 500;
    }

    .divider {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .create-link {
      display: block;
      text-align: center;
      color: #f9a8d4;
      font-size: 0.9rem;
      text-decoration: none;
      font-weight: 500;
    }
    .create-link:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .branding { display: none; }
      .login-card-wrap { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="login-wrapper">
    <div class="branding">
      <div class="brand-logo">TDC <span>Matchmaker</span></div>
      <p class="brand-tagline">
        India's most trusted matchmaking platform — connecting hearts through intelligent matching and human expertise.
      </p>
      <div class="brand-stats">
        <div class="stat-item">
          <div class="stat-num">8M+</div>
          <div class="stat-label">Matches Made</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">95%</div>
          <div class="stat-label">Success Rate</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">50+</div>
          <div class="stat-label">Cities</div>
        </div>
      </div>
    </div>

    <div class="login-card-wrap">
      <div class="login-card">
        <h2 class="card-title">Welcome back</h2>
        <p class="card-sub">Sign in to your matchmaker portal</p>

        <form onsubmit="event.preventDefault(); login();">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="username" placeholder="you@tdcmatch.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-login">Continue →</button>
        </form>

        <div id="error" class="error-msg"></div>

        <div class="divider">or</div>
        <a href="profile.html" class="create-link">Create a new account</a>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
