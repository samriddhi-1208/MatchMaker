<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TDC Matchmaker | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #4c1d95 0%, #2e1065 100%); 
            color: white; min-height: 100vh; display: flex; 
        }
        
        /* Layout & Sidebar */
        .sidebar { width: 280px; padding: 30px; background: rgba(0, 0, 0, 0.2); }
        .sidebar h1 { font-size: 1.5rem; margin-bottom: 50px; color: #e9d5ff; }
        .sidebar li { padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: 0.3s; list-style: none; }
        .sidebar li:hover { background: rgba(255, 255, 255, 0.1); }
        .logout-btn { background: #6d28d9; width: 100%; border: none; padding: 12px; border-radius: 10px; color: white; cursor: pointer; margin-top: auto; }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        
        /* Profile Grid for 100+ items */
        .profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .profile-card { background: rgba(255, 255, 255, 0.08); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-view { background: #6d28d9; border: none; padding: 10px; color: white; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>TDC Matchmaker</h1>
    <ul><li>📊 Dashboard</li><li>👥 Customers</li></ul>
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
</div>

<div class="main">
    <h1>Dashboard</h1>
    <div class="grid-stats">
        <div class="card"><h2>100+</h2><p>Total Profiles</p></div>
        <div class="card"><h2>98%</h2><p>Match Accuracy</p></div>
        <div class="card"><h2>12</h2><p>New Today</p></div>
    </div>
    <div id="profileContainer" class="profile-grid"></div>
</div>

<script>
    // Generating 100 dummy profiles
    const profiles = Array.from({ length: 100 }, (_, i) => ({
        id: i + 1,
        name: `Candidate ${i + 1}`,
        prof: ["Engineer", "Doctor", "Designer", "Artist"][i % 4],
        city: ["Pune", "Mumbai", "Delhi", "Bangalore"][i % 4],
        comp: Math.floor(Math.random() * 30) + 70 // Random 70-100%
    }));

    function render() {
        const container = document.getElementById('profileContainer');
        container.innerHTML = profiles.map(p => `
            <div class="profile-card">
                <h3>${p.name}</h3>
                <p>Profession: ${p.prof}</p>
                <p>City: ${p.city}</p>
                <p><strong>${p.comp}% Compatibility</strong></p>
                <button class="btn-view" onclick="openProfile(${p.id})">View Profile</button>
            </div>
        `).join('');
    }

    function openProfile(id) {
        const p = profiles.find(x => x.id === id);
        localStorage.setItem("selectedProfile", JSON.stringify(p));
        window.location.href = "profile-view.html";
    }

    render();
</script>
</body>
</html>
