<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TDC Matchmaker | Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; min-height: 100vh; }

        /* Sidebar: Match your Login Portal style */
        .sidebar { width: 260px; background: #0f172a; color: #94a3b8; padding: 30px; display: flex; flex-direction: column; }
        .sidebar h1 { font-size: 1.2rem; color: white; margin-bottom: 40px; }
        .sidebar li { padding: 12px; margin-bottom: 8px; cursor: pointer; border-radius: 8px; transition: 0.2s; list-style: none; }
        .sidebar li:hover { background: #1e293b; color: white; }

        /* Main Content */
        .main { flex: 1; padding: 40px; }
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        /* The Profile Grid */
        .profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .profile-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; transition: 0.2s; }
        .profile-card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .btn-view { background: #6366f1; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>TDC Matchmaker</h1>
    <ul><li>📊 Dashboard</li><li>👥 Customers</li></ul>
</div>

<div class="main">
    <h1 style="color: #0f172a;">Dashboard</h1>
    <div class="grid-stats">
        <div class="card"><h2>3</h2><p style="color:#64748b; margin:0;">Total Profiles</p></div>
        <div class="card"><h2>98%</h2><p style="color:#64748b; margin:0;">Accuracy</p></div>
        <div class="card"><h2>12</h2><p style="color:#64748b; margin:0;">New Today</p></div>
    </div>
    <div id="profileContainer" class="profile-grid"></div>
</div>

<script>
    const profiles = [
        { id: 1, name: "Ishita Sharma", prof: "Engineer", city: "Pune", comp: 80, bio: "Tech enthusiast who loves coffee and trekking." },
        { id: 2, name: "Riya Kapoor", prof: "Teacher", city: "Mumbai", comp: 72, bio: "Passionate about literature and early education." },
        { id: 3, name: "Ananya Jain", prof: "Doctor", city: "Delhi", comp: 90, bio: "Dedicated physician with a love for classical music." }
    ];

    document.getElementById('profileContainer').innerHTML = profiles.map(p => `
        <div class="profile-card">
            <h3 style="margin-top:0;">${p.name}</h3>
            <p style="color:#64748b;">${p.prof} | ${p.city}</p>
            <h2 style="color:#6366f1;">${p.comp}% Match</h2>
            <button class="btn-view" onclick="viewProfile(${p.id})">View Profile</button>
        </div>
    `).join('');

    function viewProfile(id) {
        localStorage.setItem("activeProfile", JSON.stringify(profiles.find(p => p.id === id)));
        window.location.href = "profile-view.html";
    }
</script>
</body>
</html>
